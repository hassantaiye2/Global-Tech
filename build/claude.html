<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --panel:    #181c27;
      --border:   #2a2f42;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --text:     #e8e9f0;
      --muted:    #000000;
      --error:    #f87171;
      --input-bg: #1e2235;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      padding: 1.5rem;
    }

    /* Ambient glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(108,99,255,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.8rem 2.4rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 18px 18px 0 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .logo-name {
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
    }

    input::placeholder { color: var(--muted); }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .forgot {
      font-size: 0.82rem;
      color: var(--accent2);
      text-decoration: none;
      transition: color 0.15s;
    }
    .forgot:hover { color: #fff; }

    .btn {
      display: block;
      width: 100%;
      padding: 0.82rem;
      margin-top: 1.6rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); opacity: 1; }

    /* Shimmer on hover */
    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s ease;
    }
    .btn:hover::after { left: 150%; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.6rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-outline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-outline:hover { background: var(--border); border-color: #3b4060; }

    .signup {
      text-align: center;
      margin-top: 1.6rem;
      font-size: 0.87rem;
      color: var(--muted);
    }
    .signup a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
    }
    .signup a:hover { color: #fff; }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--error);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .error-msg.show { display: block; }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.4rem; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">✦</div>
    <span class="logo-name">Yourapp</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Log in to continue to your account.</p>

  <div class="error-msg" id="errorMsg">
    Incorrect email or password. Please try again.
  </div>

  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>

  <div class="field">
    <div class="field-row">
      <label for="password">Password</label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn" onclick="handleLogin()">Log in</button>

  <div class="divider">or</div>

  <button class="btn-outline">
    <!-- Google G icon -->
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Continue with Google
  </button>

  <p class="signup">Don't have an account? <a href="#">Sign up</a></p>

</div>

<script>
  function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    // Basic validation
    if (!email || !password) {
      errorMsg.textContent = 'Please fill in both fields.';
      errorMsg.classList.add('show');
      return;
    }

    // Demo: simulate a failed login (replace this with your real logic)
    errorMsg.textContent = 'Incorrect email or password. Please try again.';
    errorMsg.classList.add('show');
  }

  // Hide error when user starts typing again
  document.getElementById('email').addEventListener('input', () => {
    document.getElementById('errorMsg').classList.remove('show');
  });
  document.getElementById('password').addEventListener('input', () => {
    document.getElementById('errorMsg').classList.remove('show');
  });
</script>

</body>
</html>
